<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prijava</title>
    <link rel="icon" type="image/png" href="/assets/zrsvn_logo.png?t=12345">
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Open Sans', sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
      }
      .header-container {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .header-container img {
        height: 50px;
        margin-right: 15px;
        vertical-align: middle;
      }
      .header-container h2 {
        margin: 0;
        font-size: 24px;
        line-height: 1;
        display: flex;
        align-items: center;
      }
      #login-container {
        display: inline-block;
        text-align: center;
        width: 60%;
        max-width: 400px;
      }
    </style>
</head>
<body>
    <div class="header-container">
      <img src="/assets/zrsvn_logo.png" alt="ZRSVN Logo">
      <h2>Vrednotenje parov vprašanj in odgovorov</h2>
    </div>
    <div id="login-container">
      <h3>Vnesite vaš e-naslov</h3>
      <form method="post" action="/login" class="mt-3">
        <div class="mb-3">
          <input type="email" name="email" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Prijava</button>
      </form>
    </div>
</body>
</html>
