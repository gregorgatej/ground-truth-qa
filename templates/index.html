<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vrednotenje QA parov</title>
    <!-- HTMX for dynamic partial updates -->
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Open Sans font -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap"
          rel="stylesheet">

    <style>
      body {
        font-family: 'Open Sans', sans-serif;
        text-align: center; /* Center everything horizontally */
        margin: 0;
        padding: 20px;
      }
      #qa-container {
        display: inline-block; /* Allows centering the content block */
        text-align: left;      /* So text inside is left-aligned */
        width: 60%;
        max-width: 800px;
      }
      h2 {
        margin-bottom: 20px;
      }
    </style>
</head>
<body>
    <h2>Vrednotenje parov vprašanj in odgovorov</h2>

    <!-- We'll inject the first QA item here -->
    <div id="qa-container">
        {{ qa_content | safe }}
    </div>
</body>
</html>
