<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Evaluation of QA pairs</title>

    <link rel="icon" type="image/png" href="/assets/zrsvn_logo.png?t=12345">

    <script src="https://unpkg.com/htmx.org@1.9.2"></script>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap"
          rel="stylesheet">

    <style>
      body {
        font-family: 'Open Sans', sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
      }
      .header-container {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .header-container img {
        height: 50px;
        margin-right: 15px;
        vertical-align: middle;
      }
      .header-container h2 {
        margin: 0;
        font-size: 24px;
        line-height: 1;
        display: flex;
        align-items: center;
      }
      #qa-container {
        display: inline-block;
        text-align: left;
        width: 60%;
        max-width: 800px;
      }
      h2 {
        margin-bottom: 20px;
      }
    </style>
</head>
<body>
    <div class="header-container">
      <img src="/assets/zrsvn_logo.png" alt="ZRSVN Logo">
      <h2>Evaluation of question-answer pairs</h2>
    </div>
    <!-- The first content of the question-answer pair (HTML fragment) will be dynamically inserted here. -->
    <div id="qa-container">
      {{ qa_content | safe }}
    </div>
    <script>
      /* 
        This JavaScript listens for the HTMX event: 'htmx:afterSwap'.
        When HTMX swaps the content in #qa-container, we want to refresh the image source
        so the browser does not use the old cache.
        We find the image with id="qa-image" and add the current time to its URL
        as a parameter '?t=...'.
      */
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            let img = document.getElementById('qa-image');
            if (img) {
                img.src = img.src.split('?')[0] + '?t=' + new Date().getTime();  // Cache-busting
            }
        });
    </script>    
</body>
</html>
