<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vrednotenje QA parov</title>

      <!-- Favicon (logo in tab) -->
    <link rel="icon" type="image/png" href="/assets/zrsvn_logo.png?t=12345"> <!-- <-- NEW -->

    <!-- HTMX for dynamic partial updates -->
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Open Sans font -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap"
          rel="stylesheet">

    <style>
      body {
        font-family: 'Open Sans', sans-serif;
        text-align: center; /* Center everything horizontally */
        margin: 0;
        padding: 20px;
      }
      .header-container {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .header-container img {
        height: 50px; /* Adjust logo size */
        margin-right: 15px;
        vertical-align: middle;
      }
      .header-container h2 {
        margin: 0;
        font-size: 24px;
        line-height: 1;
        display: flex;
        align-items: center;
      }
      #qa-container {
        display: inline-block; /* Allows centering the content block */
        text-align: left;      /* So text inside is left-aligned */
        width: 60%;
        max-width: 800px;
      }
      h2 {
        margin-bottom: 20px;
      }
    </style>
</head>
<body>
    <!-- Insert the logo to the left of your heading -->
    <div class="header-container">
      <img src="/assets/zrsvn_logo.png" alt="ZRSVN Logo">
      <h2>Vrednotenje parov vprašanj in odgovorov</h2>
    </div>
    <!-- We'll inject the first QA item here -->
    <div id="qa-container">
        {{ qa_content | safe }}
    </div>
    <script>
     /* Ta JS skripta po vsaki HTMX menjavi osveži URL slike tako, da doda časovni parameter (?t=...).
        Tako brskalnik vedno naloži posodobljeno sliko, ne pa jo vzame iz predpomnilnika. */
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            let img = document.getElementById('qa-image');
            if (img) {
                img.src = img.src.split('?')[0] + '?t=' + new Date().getTime();  // Cache-busting
            }
        });
    </script>    
</body>
</html>
